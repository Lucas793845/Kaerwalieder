<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schloßkärwa Almoshof Trainer</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS für moderne Animationen & Styling -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f9fa;
        }

        /* Schöne, unauffällige Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 10px; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #eab308; }

        /* Blur-Effekt für den Lern-Modus */
        .blur-text { 
            filter: blur(8px); 
            user-select: none; 
            opacity: 0.6;
            transition: all 0.4s ease;
        }

        /* Weiche Einblend-Animationen */
        .tab-content {
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Moderne Glow-Schatten */
        .glow-shadow {
            box-shadow: 0 10px 40px -10px rgba(195, 36, 42, 0.15);
        }
        .glow-shadow-yellow {
            box-shadow: 0 10px 40px -10px rgba(244, 170, 38, 0.3);
        }

        /* Lieder-Liste Hover Effekt */
        .song-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .song-item:hover {
            transform: translateX(5px);
            background-color: white;
            border-color: #fde68a;
        }
        
        /* Glassmorphismus für den Textbereich */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- PASSWORD OVERLAY (Mit weichem Blur-Hintergrund) -->

        <div class="bg-white p-10 rounded-[2rem] shadow-2xl text-center w-full max-w-sm transform scale-100 transition-transform duration-300 border-b-8 border-[#f4aa26]">
            <div class="w-20 h-20 bg-[#fde68a] rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i data-lucide="lock" class="w-10 h-10 text-[#c3242a]"></i>
            </div>
            <h2 class="text-3xl font-black text-[#c3242a] mb-2 tracking-tight">Halt, stop!</h2>

            <input type="password" id="password-input" placeholder="Passwort eingeben" class="w-full p-4 mb-6 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-[#f4aa26] focus:bg-white text-center font-bold text-lg transition-all shadow-sm">

                Eintreten
            </button>
        </div>
    </div>

    <!-- Moderner Header mit Gradient und Pattern -->

            <span class="px-4 py-1.5 bg-white/20 backdrop-blur-sm rounded-full text-sm font-bold tracking-widest uppercase mb-4 shadow-sm border border-white/30">
                Schloßkärwa Trainer
            </span>
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter drop-shadow-xl text-transparent bg-clip-text bg-gradient-to-b from-white to-[#fde68a]">
                ALMOSHOF

        </div>
    </header>

            </button>
            <button onclick="switchTab('tab-practice')" id="btn-tab-practice" class="nav-btn text-slate-500 hover:text-slate-800 hover:bg-slate-50 px-6 py-3 rounded-full font-bold text-sm md:text-base flex items-center gap-2 transition-all duration-300">

            </button>

                    <div class="p-4 bg-slate-50 rounded-2xl text-slate-600 italic mb-6 text-sm border border-slate-100 shadow-inner">

                    </div>
                </div>

            </div>
            
            <div id="dictionary-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

        </div>

    <!-- Footer -->

        <p>Gmacht für die Almoshiefer Kärwa</p>

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const overlay = document.getElementById('password-overlay');
            if (input === PASSWORD) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500); // Weiches Ausblenden
            } else {
                const inputEl = document.getElementById('password-input');
                inputEl.classList.add('border-red-500', 'animate-pulse');
                setTimeout(() => inputEl.classList.remove('border-red-500', 'animate-pulse'), 1000);
            }
        }

        // ==========================================

        // ==========================================
        let activeSongId = 1;
        let practiceMode = false;

        window.switchTab = function(tabId) {
            // Ausblenden mit Fade-Out Effekt
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
                setTimeout(() => el.style.display = 'none', 300); // Warte auf Animation
            });

            // Button Styles animieren
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn text-slate-500 hover:text-slate-800 hover:bg-slate-50 px-6 py-3 rounded-full font-bold text-sm md:text-base flex items-center gap-2 transition-all duration-300";
            });
            
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.className = "nav-btn active-nav bg-[#c3242a] text-white shadow-lg px-6 py-3 rounded-full font-bold text-sm md:text-base flex items-center gap-2 transition-all duration-300 transform scale-105";

            // Einblenden mit Fade-In
            setTimeout(() => {
                const newTab = document.getElementById(tabId);
                newTab.style.display = 'block';
                // Trigger reflow für die Animation
                void newTab.offsetWidth; 
                newTab.classList.add('active');
                
                const sidebar = document.getElementById('sidebar-songs');
                if (tabId === 'tab-dictionary') {
                    sidebar.style.display = 'none';
                } else {
                    sidebar.style.display = 'flex';
                }
            }, 300);
        }

        window.selectSong = function(id) {
            document.querySelectorAll('.song-list-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'border-slate-200', 'shadow-sm', 'text-[#c3242a]', 'font-bold');
                btn.classList.add('text-slate-600', 'border-transparent');
                // Icon verstecken
                const icon = btn.querySelector('.active-indicator');
                if(icon) icon.classList.add('opacity-0');
            });

            activeSongId = id;
            const song = kaerwaLieder.find(s => s.id === id);
            
            const activeBtn = document.getElementById(`song-btn-${id}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-600', 'border-transparent');
                activeBtn.classList.add('bg-white', 'border-slate-200', 'shadow-sm', 'text-[#c3242a]', 'font-bold');
                const icon = activeBtn.querySelector('.active-indicator');
                if(icon) icon.classList.remove('opacity-0');
            }

            // Weicher Textwechsel
            const titleEl = document.getElementById('active-song-title');
            const lyricsEl1 = document.getElementById('active-song-lyrics');
            const lyricsEl2 = document.getElementById('practice-lyrics');
            
            [titleEl, lyricsEl1, lyricsEl2].forEach(el => el.style.opacity = '0');
            
            setTimeout(() => {
                titleEl.textContent = `${song.id}. ${song.title}`;
                lyricsEl1.textContent = song.lyrics;
                lyricsEl2.textContent = song.lyrics;
                [titleEl, lyricsEl1, lyricsEl2].forEach(el => el.style.opacity = '1');
                applyLearnModeStyles();
            }, 200);

            const audioContainer = document.getElementById('audio-container');
            const audioPlayer = document.getElementById('audio-player');
            if (song.audioUrl) {
                audioContainer.classList.remove('hidden');
                audioPlayer.src = song.audioUrl;
            } else {
                audioContainer.classList.add('hidden');
                audioPlayer.src = "";
            }

            const results = document.getElementById('results-section');
            results.classList.remove('translate-y-0', 'opacity-100');
            results.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => results.classList.add('hidden'), 500);
            
            if (isRecording) stopRecording();
        }

        const btnLearnMode = document.getElementById('btn-learn-mode');
        btnLearnMode.addEventListener('click', () => {
            practiceMode = !practiceMode;
            // Kleiner Button-Klick Effekt
            btnLearnMode.style.transform = 'scale(0.95)';
            setTimeout(() => btnLearnMode.style.transform = 'scale(1)', 150);
            applyLearnModeStyles();
        });

        function applyLearnModeStyles() {
            const lyrics1 = document.getElementById('active-song-lyrics');
            const lyrics2 = document.getElementById('practice-lyrics');
            const icon = document.getElementById('learn-icon');
            const text = document.getElementById('learn-text');

            if (practiceMode) {
                lyrics1.classList.add('blur-text');
                lyrics2.classList.add('blur-text');
                text.textContent = "Text anzeigen";
                icon.setAttribute('data-lucide', 'eye');
                btnLearnMode.classList.add('bg-[#c3242a]', 'text-white');
                btnLearnMode.classList.remove('bg-slate-50', 'text-slate-600');
            } else {
                lyrics1.classList.remove('blur-text');
                lyrics2.classList.remove('blur-text');
                text.textContent = "Lern-Modus";
                icon.setAttribute('data-lucide', 'eye-off');
                btnLearnMode.classList.remove('bg-[#c3242a]', 'text-white');
                btnLearnMode.classList.add('bg-slate-50', 'text-slate-600');
            }
            lucide.createIcons();
        }

        // ==========================================
        // 4. SPRACHERKENNUNG & SCORE
        // ==========================================
        let isRecording = false;
        let recognition = null;
        let fullTranscript = "";

        // Fuzzy Matching Algorithm (unverändert)
        function getLevenshteinDistance(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b[i - 1] === a[j - 1]) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
                }
            }
            return matrix[b.length][a.length];
        }

        function calculateMatchScore(original, spoken) {
            if (!spoken) return 0;
            const cleanOrig = original.toLowerCase().replace(/[^a-zäöüß0-9]/g, '');
            const cleanSpok = spoken.toLowerCase().replace(/[^a-zäöüß0-9]/g, '');
            if (cleanOrig.length === 0) return 0;

            const dist = getLevenshteinDistance(cleanOrig, cleanSpok);
            const maxLen = Math.max(cleanOrig.length, cleanSpok.length);
            let score = ((maxLen - dist) / maxLen) * 100;

            const origWords = original.toLowerCase().replace(/[^a-zäöüß0-9 ]/g, '').split(' ');
            const spokWords = spoken.toLowerCase().replace(/[^a-zäöüß0-9 ]/g, '').split(' ');
            let matches = 0, sigWords = 0;
            origWords.forEach(w => { if (w.length > 2) { sigWords++; if (spokWords.includes(w)) matches++; }});
            if (sigWords > 0) score = Math.max(score, (matches / sigWords) * 100);
            return Math.min(Math.max(Math.round(score), 0), 100);
        }

        function initSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return false;
            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';

            recognition.onresult = (e) => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + " ";
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('recognized-text').textContent = (fullTranscript + interim).trim() || "...";
            };
            recognition.onerror = () => stopRecording();
            recognition.onend = () => { if (isRecording) stopRecording(); };
            return true;
        }

        function toggleMicUI(active) {
            const btn = document.getElementById('btn-mic');
            const pulse1 = document.getElementById('mic-pulse-1');
            const pulse2 = document.getElementById('mic-pulse-2');
            const indicator = document.getElementById('recording-indicator');
            const zone = document.getElementById('mic-zone');
            
            if (active) {
                btn.classList.replace('bg-white', 'bg-[#c3242a]');
                btn.classList.replace('text-[#c3242a]', 'text-white');
                pulse1.classList.replace('opacity-0', 'opacity-100');
                pulse2.classList.replace('opacity-0', 'opacity-100');
                pulse1.classList.add('animate-ping');
                zone.classList.replace('border-slate-200', 'border-red-300');
                document.getElementById('mic-status-text').textContent = "Stop";
                indicator.classList.remove('hidden');
            } else {
                btn.classList.replace('bg-[#c3242a]', 'bg-white');
                btn.classList.replace('text-white', 'text-[#c3242a]');
                pulse1.classList.replace('opacity-100', 'opacity-0');
                pulse2.classList.replace('opacity-100', 'opacity-0');
                pulse1.classList.remove('animate-ping');
                zone.classList.replace('border-red-300', 'border-slate-200');
                document.getElementById('mic-status-text').textContent = "Starten";
                indicator.classList.add('hidden');
            }
        }

        function startRecording() {
            if (!recognition && !initSpeech()) return alert("Spracherkennung wird leider in diesem Browser nicht unterstützt.");
            fullTranscript = "";
            document.getElementById('recognized-text').textContent = "...";
            
            const results = document.getElementById('results-section');
            results.classList.remove('translate-y-0', 'opacity-100');
            results.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => results.classList.add('hidden'), 300);
            
            try {
                recognition.start();
                isRecording = true;
                toggleMicUI(true);
            } catch (err) {}
        }

        function stopRecording() {
            if (!isRecording) return;
            try { recognition.stop(); } catch(e){}
            isRecording = false;
            toggleMicUI(false);

            setTimeout(() => {
                const spoken = document.getElementById('recognized-text').textContent;
                const score = calculateMatchScore(kaerwaLieder.find(s => s.id === activeSongId).lyrics, spoken);
                
                document.getElementById('score-percent').textContent = score + "%";
                const results = document.getElementById('results-section');
                results.classList.remove('hidden');
                
                // Weiches Einblenden der Ergebnisse
                setTimeout(() => {
                    results.classList.remove('translate-y-4', 'opacity-0');
                    results.classList.add('translate-y-0', 'opacity-100');
                }, 50);

                const banner = document.getElementById('score-banner');
                const hl = document.getElementById('score-headline');
                const box = document.getElementById('score-icon-box');

                banner.className = "p-6 rounded-2xl flex items-center justify-between text-white shadow-xl transition-all duration-500 transform hover:scale-[1.02] ";
                
                if (score > 70) {
                    banner.classList.add('bg-gradient-to-r', 'from-green-500', 'to-emerald-600');
                    hl.textContent = "Bassd scho! (Klasse)";
                    box.innerHTML = '<i data-lucide="check-circle" class="w-8 h-8 text-white"></i>';
                } else if (score > 35) {
                    banner.classList.add('bg-gradient-to-r', 'from-amber-400', 'to-orange-500');
                    hl.textContent = "Ganz ordentlich (Üb noch)";
                    box.innerHTML = '<i data-lucide="help-circle" class="w-8 h-8 text-white"></i>';
                } else {
                    banner.classList.add('bg-gradient-to-r', 'from-slate-600', 'to-slate-700');
                    hl.textContent = "Naa, des war nix!";
                    box.innerHTML = '<i data-lucide="x-circle" class="w-8 h-8 text-white"></i>';
                }
                lucide.createIcons();
            }, 600);
        }

        document.getElementById('btn-mic').addEventListener('click', () => isRecording ? stopRecording() : startRecording());

        // ==========================================
        // 5. INITIALISIERUNG
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Moderne Liederliste
            document.getElementById('song-list').innerHTML = kaerwaLieder.map(song => `
                <button onclick="selectSong(${song.id})" id="song-btn-${song.id}" class="song-list-btn song-item w-full text-left p-3.5 rounded-xl flex items-center justify-between text-slate-600 hover:bg-white text-sm border border-transparent border-b-slate-50 relative overflow-hidden group">
                    <div class="flex items-center gap-3 relative z-10">
                        <i data-lucide="chevron-right" class="w-4 h-4 active-indicator opacity-0 transition-opacity text-[#c3242a]"></i>
                        <span class="truncate pr-2 font-medium">${song.id}. ${song.title}</span>
                    </div>
                    ${song.audioUrl ? '<div class="p-1.5 bg-slate-100 rounded-full group-hover:bg-[#fde68a]/50 transition-colors relative z-10"><i data-lucide="play" class="w-3 h-3 text-slate-400 group-hover:text-[#c3242a]"></i></div>' : ''}
                </button>
            `).join('');

            // Modernes Lexikon Grid
            document.getElementById('dictionary-grid').innerHTML = dictWords.map(word => `
                <div class="group bg-white p-5 rounded-2xl border border-slate-100 hover:border-[#fde68a] hover:shadow-xl transition-all duration-300 flex flex-col justify-center min-h-[120px] relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-[#fff8e7] to-transparent opacity-50 rounded-bl-full transform group-hover:scale-125 transition-transform"></div>
                    <div class="font-black text-xl text-[#c3242a] mb-2 leading-tight relative z-10">${word.franken}</div>
                    <div class="text-slate-500 font-medium text-sm leading-snug relative z-10 flex items-center gap-2">
                        <i data-lucide="arrow-right" class="w-3 h-3 opacity-50"></i> ${word.hoch}
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
            
            // Verstecke die Tabs beim initialen Laden kurz, um die Fade-In Animation sauber zu starten
            document.getElementById('tab-lyrics').style.display = 'block';
            setTimeout(() => document.getElementById('tab-lyrics').classList.add('active'), 50);

            document.getElementById('password-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') checkPassword();
            });
        });
    </script>
</body>
