        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .blur-text { 
            filter: blur(8px); 
            user-select: none; 
            background-color: #e2e8f0;
            color: transparent;
            transition: all 0.3s ease;
        }

            display: block;

        }

            background-color: #ffffff;
            border: 1px solid #e2e8f0;

        // ==========================================
        // NEUER, BESSERER SPRACHERKENNUNGS-ALGORITHMUS
        // ==========================================
        let isRecording = false;
        let recognition = null;

        function getLevenshteinDistance(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b[i - 1] === a[j - 1]) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
                }
            }
            return matrix[b.length][a.length];
        }

        // Der neue Algorithmus straft extra-Wörter nicht mehr ab. 
        // Er sucht nur: "Wieviele Wörter aus dem Original finde ich (auch leicht falsch geschrieben) im Gesprochenen?"
        function calculateRobustScore(original, spoken) {
            if (!spoken) return 0;
            
            // Alles normalisieren (Sonderzeichen weg, kleinschreiben)
            const normalize = str => str.toLowerCase().replace(/[^a-zäöüß0-9 ]/g, '').replace(/\s+/g, ' ').trim();
            const origWords = normalize(original).split(' ');
            const spokWords = normalize(spoken).split(' ');

            if (origWords.length === 0) return 0;

            let matchesFound = 0;

            origWords.forEach(oWord => {
                if (oWord.length <= 2) {
                    if (spokWords.includes(oWord)) matchesFound++;
                    return;
                }

                // Suche das ähnlichste Wort im gesprochenen Text
                let highestSimilarity = 0;
                spokWords.forEach(sWord => {
                    const dist = getLevenshteinDistance(oWord, sWord);
                    const maxLen = Math.max(oWord.length, sWord.length);
                    const similarity = (maxLen - dist) / maxLen;
                    if (similarity > highestSimilarity) {
                        highestSimilarity = similarity;
                    }
                });

                // Ab 60% Ähnlichkeit lassen wir es als Treffer gelten (Toleranz für Fränkisch -> Hochdeutsch)
                // Beispiel: "Madla" und "Mädel" = 60% Ähnlich.
                if (highestSimilarity >= 0.60) {
                    matchesFound++;
                }
            });

            // Der Score ist jetzt einfach der Anteil der gefundenen Wörter. 
            // So zerstört ein "Android-Stotter-Bug" nicht mehr das Ergebnis!
            let score = (matchesFound / origWords.length) * 100;
            return Math.min(Math.max(Math.round(score), 0), 100);
        }

        function initSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            const SGL = window.SpeechGrammarList || window.webkitSpeechGrammarList;
            if (!SR) return false;
            
            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = false; // Verhindert den Stotter-Bug
            recognition.lang = 'de-DE';

            // Wörterbuch in die Erkennung einspeisen (hilft dem Browser bei Dialektwörtern)
            if (SGL) {
                const speechRecognitionList = new SGL();
                const grammarWords = dictWords.map(d => d.franken).join(' | ');
                const grammar = '#JSGF V1.0; grammar kaerwa; public <word> = ' + grammarWords + ' ;';
                speechRecognitionList.addFromString(grammar, 1);
                recognition.grammars = speechRecognitionList;
            }

            recognition.onresult = (e) => {
                let transcript = "";
                for (let i = 0; i < e.results.length; i++) {
                    transcript += e.results[i][0].transcript + " ";
                }
                document.getElementById('recognized-text').textContent = transcript.trim() || "...";
            };
            
            recognition.onerror = (e) => {
                console.error("Speech Error: ", e);
                stopRecording();
            }
            recognition.onend = () => { if (isRecording) stopRecording(); };
            return true;
        }

        function toggleMicUI(active) {
            const btn = document.getElementById('btn-mic');
            const indicator = document.getElementById('recording-indicator');
            const zone = document.getElementById('mic-zone');
            
            if (active) {
                btn.classList.replace('bg-white', 'bg-[#c3242a]');
                btn.classList.replace('text-[#c3242a]', 'text-white');
                zone.classList.replace('border-gray-300', 'border-[#c3242a]');
                document.getElementById('mic-status-text').textContent = "Stop";
                indicator.classList.remove('hidden');
            } else {
                btn.classList.replace('bg-[#c3242a]', 'bg-white');
                btn.classList.replace('text-white', 'text-[#c3242a]');
                zone.classList.replace('border-[#c3242a]', 'border-gray-300');
                document.getElementById('mic-status-text').textContent = "Aufnehmen";
                indicator.classList.add('hidden');
            }
        }

        function startRecording() {
            if (!recognition && !initSpeech()) {
                alert("Spracherkennung wird in deinem Browser nicht unterstützt. (Nutze Chrome/Safari)");
                return;
            }
            document.getElementById('recognized-text').textContent = "...";
            document.getElementById('results-section').classList.add('hidden');
            
            try {
                recognition.start();
                isRecording = true;
                toggleMicUI(true);
            } catch (err) {
                console.error(err);
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            try { recognition.stop(); } catch(e){}
            isRecording = false;
            toggleMicUI(false);

            setTimeout(() => {
                const spoken = document.getElementById('recognized-text').textContent;
                // Nutze den neuen, toleranten Algorithmus!
                const score = calculateRobustScore(kaerwaLieder.find(s => s.id === activeSongId).lyrics, spoken);
                
                document.getElementById('score-percent').textContent = score + "%";
                document.getElementById('results-section').classList.remove('hidden');

                const banner = document.getElementById('score-banner');
                const hl = document.getElementById('score-headline');
                const box = document.getElementById('score-icon-box');

                banner.className = "p-5 rounded-xl flex items-center justify-between text-white shadow-sm border-b-4 ";
                
                if (score >= 70) {
                    banner.classList.add('bg-green-600', 'border-green-800');
                    hl.textContent = "Bassd scho! (Klasse)";
                    box.innerHTML = '<i data-lucide="check-circle" class="w-8 h-8 text-white"></i>';
                } else if (score >= 40) {
                    banner.classList.add('bg-[#f4aa26]', 'border-[#d98b11]');
                    hl.textContent = "Ganz ordentlich (Üb noch a weng)";
                    box.innerHTML = '<i data-lucide="help-circle" class="w-8 h-8 text-white"></i>';
                } else {
                    banner.classList.add('bg-[#c3242a]', 'border-[#9b191e]');
                    hl.textContent = "Naa, des war nix!";
                    box.innerHTML = '<i data-lucide="x-circle" class="w-8 h-8 text-white"></i>';
                }
                lucide.createIcons();
            }, 600);
        }

        document.getElementById('btn-mic').addEventListener('click', () => isRecording ? stopRecording() : startRecording());

        // ==========================================
        // INITIALISIERUNG
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Liederliste füllen
            document.getElementById('song-list').innerHTML = kaerwaLieder.map(song => `
                <button onclick="selectSong(${song.id})" id="song-btn-${song.id}" class="song-list-btn w-full text-left p-3 mb-1 rounded-md transition-colors flex items-center justify-between text-gray-700 hover:bg-gray-100 font-semibold text-sm">
                    <span class="truncate pr-2">${song.id}. ${song.title}</span>
                    ${song.audioUrl ? '<i data-lucide="play-circle" class="w-4 h-4 opacity-50"></i>' : ''}
                </button>
            `).join('');

            // Lexikon füllen
            document.getElementById('dictionary-grid').innerHTML = dictWords.map(word => `
                <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col justify-center min-h-[90px]">
                    <div class="font-black text-lg text-[#c3242a] mb-1 leading-tight">${word.franken}</div>
                    <div class="text-gray-600 font-semibold text-sm leading-snug flex items-center gap-1">
                        <i data-lucide="arrow-right" class="w-3 h-3 text-gray-400"></i> ${word.hoch}
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
            
            // Tab 1 starten
            document.getElementById('tab-lyrics').style.display = 'block';
            setTimeout(() => document.getElementById('tab-lyrics').classList.add('active'), 50);
            
            // Lied 1 auswählen
            selectSong(1);
        });
    </script>
</body>
