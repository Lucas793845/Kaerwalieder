<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schloßkärwa Almoshof Trainer</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS für Apple Liquid Glass & Typography -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f5f7; /* Apple's signature light gray */
            /* Animated gradient background using Almoshof colors but softened */
            background: linear-gradient(-45deg, #fde68a, #f4aa26, #c3242a, #f5f5f7);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #1d1d1f;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Apple Liquid Glass Utility Classes */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.8);
        }

        .liquid-glass-dark {
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: white;
        }
        
        .liquid-nav {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Clean Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(0,0,0,0.2); 
            border-radius: 10px; 
        }

        /* Blur-Effekt für den Lern-Modus */
        .blur-text { 
            filter: blur(8px); 
            user-select: none; 
            opacity: 0.5;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Weiche Einblend-Animationen korrigiert */
        .tab-content {
            display: none;
            opacity: 0;
            transform: scale(0.98) translateY(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-content.active {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Apple-style Button Hover */
        .apple-btn {
            transition: all 0.2s ease;
        }
        .apple-btn:active {
            transform: scale(0.96);
        }

        /* Dictionary Grid Item Hover */
        .dict-item {
            transition: all 0.3s ease;
        }
        .dict-item:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden selection:bg-[#c3242a] selection:text-white">

        // ==========================================
        // UI STATE LOGIC - BUG FIXED
        // ==========================================
        let activeSongId = 1;
        let practiceMode = false;

        window.switchTab = function(tabId) {
            // Erst alle anderen Tabs verbergen (nicht den, den wir gleich anzeigen wollen!)
            document.querySelectorAll('.tab-content').forEach(el => {
                if (el.id !== tabId) {
                    el.classList.remove('active');
                    // Warten, bis die Animation vorbei ist, dann aus dem Layout nehmen
                    setTimeout(() => {
                        // Noch ein Check, falls man ganz schnell hin und her geklickt hat
                        if (!el.classList.contains('active')) {
                            el.style.display = 'none';
                        }
                    }, 400); 
                }
            });

            // Button Styles zurücksetzen
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn text-gray-600 hover:text-gray-900 px-5 py-2 rounded-full font-medium text-sm flex items-center gap-2 transition-all duration-300";
            });
            
            // Aktiven Button hervorheben
            const activeBtn = document.getElementById('btn-' + tabId);
            if (activeBtn) {
                activeBtn.className = "nav-btn active-nav bg-white shadow-sm border border-gray-200 text-gray-900 px-5 py-2 rounded-full font-medium text-sm flex items-center gap-2 transition-all duration-300";
            }

            // Neuen Tab einblenden
            const newTab = document.getElementById(tabId);
            if (newTab) {
                newTab.style.display = 'block';
                // Mini-Verzögerung, damit der Browser die "display: block" Änderung erkennt, bevor die Klasse hinzugefügt wird
                setTimeout(() => {
                    newTab.classList.add('active');
                }, 10);
            }
            
            // Sidebar Layout (Liederliste im Wörterbuch ausblenden)
            const sidebar = document.getElementById('sidebar-songs');
            if (tabId === 'tab-dictionary') {
                sidebar.style.display = 'none';
            } else {
                sidebar.style.display = 'flex';
            }
        }

        window.selectSong = function(id) {
            document.querySelectorAll('.song-list-btn').forEach(btn => {
                btn.classList.remove('bg-white/60', 'shadow-sm', 'font-semibold', 'text-gray-900');
                btn.classList.add('text-gray-600');
            });

            activeSongId = id;
            const song = kaerwaLieder.find(s => s.id === id);
            
            const activeBtn = document.getElementById(`song-btn-${id}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-600');
                activeBtn.classList.add('bg-white/60', 'shadow-sm', 'font-semibold', 'text-gray-900');
            }

            const titleEl = document.getElementById('active-song-title');
            const lyricsEl1 = document.getElementById('active-song-lyrics');
            const lyricsEl2 = document.getElementById('practice-lyrics');
            
            [titleEl, lyricsEl1, lyricsEl2].forEach(el => el.style.opacity = '0');
            
            setTimeout(() => {
                titleEl.textContent = `${song.id}. ${song.title}`;
                lyricsEl1.textContent = song.lyrics;
                lyricsEl2.textContent = song.lyrics;
                [titleEl, lyricsEl1, lyricsEl2].forEach(el => el.style.opacity = '1');
                applyLearnModeStyles();
            }, 200);

            const audioContainer = document.getElementById('audio-container');
            const audioPlayer = document.getElementById('audio-player');
            if (song.audioUrl) {
                audioContainer.classList.remove('hidden');
                audioPlayer.src = song.audioUrl;
            } else {
                audioContainer.classList.add('hidden');
                audioPlayer.src = "";
            }

            const results = document.getElementById('results-section');
            results.classList.remove('translate-y-0', 'opacity-100');
            results.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => results.classList.add('hidden'), 500);
            
            if (isRecording) stopRecording();
        }

        const btnLearnMode = document.getElementById('btn-learn-mode');
        btnLearnMode.addEventListener('click', () => {
            practiceMode = !practiceMode;
            applyLearnModeStyles();
        });

        function applyLearnModeStyles() {
            const lyrics1 = document.getElementById('active-song-lyrics');
            const lyrics2 = document.getElementById('practice-lyrics');
            const icon = document.getElementById('learn-icon');
            const text = document.getElementById('learn-text');

            if (practiceMode) {
                lyrics1.classList.add('blur-text');
                lyrics2.classList.add('blur-text');
                text.textContent = "Text anzeigen";
                icon.setAttribute('data-lucide', 'eye');
                btnLearnMode.classList.add('bg-gray-800', 'text-white', 'border-gray-800');
                btnLearnMode.classList.remove('bg-white/50', 'text-gray-700', 'border-white/50');
            } else {
                lyrics1.classList.remove('blur-text');
                lyrics2.classList.remove('blur-text');
                text.textContent = "Lern-Modus";
                icon.setAttribute('data-lucide', 'eye-off');
                btnLearnMode.classList.remove('bg-gray-800', 'text-white', 'border-gray-800');
                btnLearnMode.classList.add('bg-white/50', 'text-gray-700', 'border-white/50');
            }
            lucide.createIcons();
        }

        // ==========================================
        // SPRACHERKENNUNG & SCORE
        // ==========================================
        let isRecording = false;
        let recognition = null;
        let fullTranscript = "";

        function getLevenshteinDistance(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b[i - 1] === a[j - 1]) matrix[i][j] = matrix[i - 1][j - 1];
                    else matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
                }
            }
            return matrix[b.length][a.length];
        }

        function calculateMatchScore(original, spoken) {
            if (!spoken) return 0;
            const cleanOrig = original.toLowerCase().replace(/[^a-zäöüß0-9]/g, '');
            const cleanSpok = spoken.toLowerCase().replace(/[^a-zäöüß0-9]/g, '');
            if (cleanOrig.length === 0) return 0;

            const dist = getLevenshteinDistance(cleanOrig, cleanSpok);
            const maxLen = Math.max(cleanOrig.length, cleanSpok.length);
            let score = ((maxLen - dist) / maxLen) * 100;

            const origWords = original.toLowerCase().replace(/[^a-zäöüß0-9 ]/g, '').split(' ');
            const spokWords = spoken.toLowerCase().replace(/[^a-zäöüß0-9 ]/g, '').split(' ');
            let matches = 0, sigWords = 0;
            origWords.forEach(w => { if (w.length > 2) { sigWords++; if (spokWords.includes(w)) matches++; }});
            if (sigWords > 0) score = Math.max(score, (matches / sigWords) * 100);
            return Math.min(Math.max(Math.round(score), 0), 100);
        }

        function initSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return false;
            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'de-DE';

            recognition.onresult = (e) => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + " ";
                    else interim += e.results[i][0].transcript;
                }
                document.getElementById('recognized-text').textContent = (fullTranscript + interim).trim() || "...";
            };
            recognition.onerror = () => stopRecording();
            recognition.onend = () => { if (isRecording) stopRecording(); };
            return true;
        }

        function toggleMicUI(active) {
            const btn = document.getElementById('btn-mic');
            const pulse1 = document.getElementById('mic-pulse-1');
            const pulse2 = document.getElementById('mic-pulse-2');
            const indicator = document.getElementById('recording-indicator');
            
            if (active) {
                btn.classList.replace('bg-white', 'bg-[#c3242a]');
                btn.classList.replace('text-[#c3242a]', 'text-white');
                pulse1.classList.replace('opacity-0', 'opacity-100');
                pulse2.classList.replace('opacity-0', 'opacity-100');
                pulse1.classList.add('animate-ping');
                document.getElementById('mic-status-text').textContent = "Stop";
                indicator.classList.remove('hidden');
            } else {
                btn.classList.replace('bg-[#c3242a]', 'bg-white');
                btn.classList.replace('text-white', 'text-[#c3242a]');
                pulse1.classList.replace('opacity-100', 'opacity-0');
                pulse2.classList.replace('opacity-100', 'opacity-0');
                pulse1.classList.remove('animate-ping');
                document.getElementById('mic-status-text').textContent = "Starten";
                indicator.classList.add('hidden');
            }
        }

        function startRecording() {
            if (!recognition && !initSpeech()) return alert("Spracherkennung wird in diesem Browser nicht unterstützt.");
            fullTranscript = "";
            document.getElementById('recognized-text').textContent = "...";
            
            const results = document.getElementById('results-section');
            results.classList.remove('translate-y-0', 'opacity-100');
            results.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => results.classList.add('hidden'), 300);
            
            try {
                recognition.start();
                isRecording = true;
                toggleMicUI(true);
            } catch (err) {}
        }

        function stopRecording() {
            if (!isRecording) return;
            try { recognition.stop(); } catch(e){}
            isRecording = false;
            toggleMicUI(false);

            setTimeout(() => {
                const spoken = document.getElementById('recognized-text').textContent;
                const score = calculateMatchScore(kaerwaLieder.find(s => s.id === activeSongId).lyrics, spoken);
                
                document.getElementById('score-percent').textContent = score + "%";
                const results = document.getElementById('results-section');
                results.classList.remove('hidden');
                
                setTimeout(() => {
                    results.classList.remove('translate-y-4', 'opacity-0');
                    results.classList.add('translate-y-0', 'opacity-100');
                }, 50);

                const banner = document.getElementById('score-banner');
                const hl = document.getElementById('score-headline');
                const box = document.getElementById('score-icon-box');

                banner.className = "p-5 rounded-2xl flex items-center justify-between text-white shadow-md transition-all duration-500 liquid-glass-dark ";
                
                if (score > 70) {
                    hl.textContent = "Sehr gut!";
                    box.innerHTML = '<i data-lucide="check-circle" class="w-6 h-6 text-green-400"></i>';
                } else if (score > 35) {
                    hl.textContent = "Ordentlich";
                    box.innerHTML = '<i data-lucide="help-circle" class="w-6 h-6 text-yellow-400"></i>';
                } else {
                    hl.textContent = "Nochmal versuchen";
                    box.innerHTML = '<i data-lucide="x-circle" class="w-6 h-6 text-red-400"></i>';
                }
                lucide.createIcons();
            }, 600);
        }

        document.getElementById('btn-mic').addEventListener('click', () => isRecording ? stopRecording() : startRecording());

        // ==========================================
        // INITIALISIERUNG
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('song-list').innerHTML = kaerwaLieder.map(song => `
                <button onclick="selectSong(${song.id})" id="song-btn-${song.id}" class="song-list-btn w-full text-left p-3.5 rounded-2xl transition-all duration-200 flex items-center justify-between text-gray-600 hover:bg-white/40 text-sm">
                    <span class="truncate pr-2">${song.id}. ${song.title}</span>
                    ${song.audioUrl ? '<i data-lucide="play-circle" class="w-4 h-4 text-gray-400"></i>' : ''}
                </button>
            `).join('');

            document.getElementById('dictionary-grid').innerHTML = dictWords.map(word => `
                <div class="dict-item bg-white/40 p-5 rounded-2xl border border-white/50 flex flex-col justify-center min-h-[100px]">
                    <div class="font-bold text-lg text-gray-900 mb-1 leading-tight">${word.franken}</div>
                    <div class="text-gray-600 font-medium text-sm leading-snug">${word.hoch}</div>
                </div>
            `).join('');

            lucide.createIcons();
            
            // Setze den ersten Tab als aktiven Start-Tab
            document.getElementById('tab-lyrics').style.display = 'block';
            setTimeout(() => document.getElementById('tab-lyrics').classList.add('active'), 50);
            
            // Lade Lied 1
            selectSong(1);
        });
    </script>
</body>
