<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schloßkärwa Almoshof Trainer</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fde68a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c3242a; border-radius: 10px; border: 2px solid #fde68a; }
        .blur-text { filter: blur(6px); user-select: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f4aa26] text-slate-900 font-sans min-h-screen flex flex-col">

    <header class="bg-[#c3242a] text-white pt-6 pb-4 shadow-md relative overflow-hidden">
        <i data-lucide="flag" class="absolute right-[-20px] top-[-20px] w-64 h-64 text-white opacity-10 rotate-12"></i>
        <div class="max-w-6xl mx-auto flex flex-col items-center text-center relative z-10 px-4">
            <h2 class="text-lg md:text-xl font-bold tracking-wider mb-0 text-white/90">Schloßkärwa in</h2>
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4 mt-[-4px] drop-shadow-lg">ALMOSHOF</h1>
        </div>
    </header>

    <nav class="bg-[#fde68a] border-b-4 border-white shadow-md sticky top-0 z-20">
        <div class="max-w-6xl mx-auto p-2 flex justify-center gap-2 md:gap-4 flex-wrap">
            <button onclick="switchTab('tab-lyrics')" id="btn-tab-lyrics" class="nav-btn bg-white shadow-md border-2 border-[#c3242a] text-[#c3242a] px-4 md:px-6 py-2 rounded-full font-black text-sm md:text-base flex items-center gap-2 transition-all">
                <i data-lucide="music" class="w-4 h-4"></i> Lieder
            </button>
            <button onclick="switchTab('tab-practice')" id="btn-tab-practice" class="nav-btn bg-transparent hover:bg-[#fff8e7] border-2 border-transparent text-[#c3242a] px-4 md:px-6 py-2 rounded-full font-black text-sm md:text-base flex items-center gap-2 transition-all">
                <i data-lucide="mic-2" class="w-4 h-4"></i> Singen üben
            </button>
            <button onclick="switchTab('tab-dictionary')" id="btn-tab-dictionary" class="nav-btn bg-transparent hover:bg-[#fff8e7] border-2 border-transparent text-[#c3242a] px-4 md:px-6 py-2 rounded-full font-black text-sm md:text-base flex items-center gap-2 transition-all">
                <i data-lucide="book" class="w-4 h-4"></i> Wörterbuch
            </button>
        </div>
    </nav>

    <main id="main-container" class="max-w-6xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-6 flex-grow">
        
        <div id="sidebar-songs" class="md:col-span-1 bg-[#fff8e7] rounded-2xl shadow-lg border-4 border-[#c3242a] overflow-hidden flex flex-col h-[50vh] md:h-[70vh]">
            <div class="p-4 bg-[#c3242a] text-white border-b-4 border-[#f4aa26] flex items-center gap-2">
                <i data-lucide="list-music" class="w-5 h-5 text-[#f4aa26]"></i>
                <h2 class="font-bold text-lg">Gstanzln</h2>
            </div>
            <div id="song-list" class="overflow-y-auto p-2 flex-grow custom-scrollbar bg-[#fff8e7]"></div>
        </div>

        <div id="content-area" class="md:col-span-2 flex flex-col gap-6">
            
            <div id="tab-lyrics" class="tab-content bg-[#fff8e7] rounded-2xl shadow-lg border-4 border-[#c3242a] p-5 md:p-6 block fade-in">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                    <h2 id="active-song-title" class="text-xl md:text-2xl font-black text-[#c3242a]">Lade Lied...</h2>
                    <button id="btn-learn-mode" class="flex items-center gap-2 px-4 py-2 bg-white hover:bg-[#fde68a] text-[#c3242a] rounded-lg text-xs font-bold transition-colors border-2 border-[#c3242a]">
                        <i data-lucide="eye-off" class="w-4 h-4" id="learn-icon"></i>
                        <span id="learn-text">Lern-Modus</span>
                    </button>
                </div>
                <div id="active-song-lyrics" class="text-base md:text-lg leading-relaxed whitespace-pre-wrap p-5 rounded-xl border-2 bg-white border-[#f4aa26] text-slate-800 font-medium transition-all duration-300 shadow-inner"></div>
                <div id="audio-container" class="mt-4 p-4 bg-[#fde68a] rounded-xl border-2 border-[#f4aa26] hidden">
                    <audio id="audio-player" controls class="w-full h-10"></audio>
                </div>
            </div>

            <div id="tab-practice" class="tab-content bg-[#fff8e7] rounded-2xl shadow-lg border-4 border-[#c3242a] p-5 md:p-6 hidden fade-in">
                <h3 class="text-lg font-black text-[#c3242a] mb-4">Singen & Üben</h3>
                <div id="practice-lyrics" class="text-base md:text-lg leading-relaxed whitespace-pre-wrap p-4 rounded-xl border-2 bg-white border-[#f4aa26] text-slate-800 font-medium mb-4"></div>
                <div class="flex flex-col items-center justify-center p-6 bg-[#fde68a] rounded-xl border-2 border-dashed border-[#c3242a]">
                    <button id="btn-mic" class="w-24 h-24 rounded-full bg-white border-4 border-[#c3242a] text-[#c3242a] flex flex-col items-center justify-center font-black">
                        <i data-lucide="mic" class="w-8 h-8"></i>
                        <span id="mic-status-text" class="text-[10px] uppercase">Starten</span>
                    </button>
                    <p id="recording-indicator" class="mt-2 text-sm font-black text-[#c3242a] animate-pulse hidden">Ich höre zu...</p>
                </div>
                <div id="results-section" class="mt-5 hidden">
                    <div id="score-banner" class="p-4 rounded-xl flex items-center justify-between text-white border-2 border-white">
                        <div id="score-headline" class="font-black">Bassd scho!</div>
                        <div id="score-percent" class="text-2xl font-black">0%</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="tab-dictionary" class="tab-content md:col-span-3 bg-[#fff8e7] rounded-2xl shadow-lg border-4 border-[#c3242a] p-5 md:p-6 hidden fade-in">
            <h2 class="text-2xl font-black text-[#c3242a] mb-6 flex items-center justify-center gap-2">Fränkisch-Lexikon</h2>
            <div id="dictionary-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <script>
        const kaerwaLieder = [
            { id: 1, title: "Almashiefer Schlössla", lyrics: "Und des Almashiefer Schlössla des is schäi beisam.\nHullareidium Hullareidium\nUnd die Almashiefer Böschla däi hald´n schäi zamm\nHullarei di rei di um" },
            { id: 2, title: "Schwatze Stieferla", lyrics: "Schwatze Stieferla, weiße Schätza und a schneidigs Häidla auf\nAlmashiefer Kärwabäschla immer lustig und wohl auf." },
            { id: 3, title: "Däi Sunna", lyrics: "Däi Sunna däi dout scheina und dreht si um die Wolkn rum \nMei Schotzala dout graina weil ich sulang ned kumm.", audioUrl: "sonne.mp3" },
            { id: 4, title: "13, 14, 15 Muggn", lyrics: "13, 14, 15 Muggn gem a goude Metzelsuppn is der Schneider nu so gla kieft er an an Muggerbaa.", audioUrl: "muecken.mp3" },
            { id: 5, title: "Mei Vadder", lyrics: "Mei Vadder ist im Himmel drom,\nund ich bin auf der Weld,\nFidrifi Drala La, Fidrifi Drala La\nDer mou mi ganz vergessn hom,\nder Schickt ma gorka Geld \nFidrifi Drala La, Kennst di aus!", audioUrl: "mei_vadda.mp3" },
            { id: 6, title: "Hinder der Stodltür", lyrics: "Hinder der Stodltür \nHänger zwa Ochsagschür \nKumma zwa Baicher rei\nDie spann ma ei." },
            { id: 7, title: "Und schäi hams uns zam gstellt", lyrics: "Und schäi hams uns zam gstellt Und schäi schauma aus\nTroie troie troium\nUnd etz schauma scho bald wie tiroler-boum aus \nTroie troie troium" },
            { id: 8, title: "Kennst di aus", lyrics: "Kennst di aus in meim Kämmerla, kennst di aus in meim Bed\nTroie troie troium\nHost scho oft bei mir gschlofa aber däft hob I ned\nTroie troie troium" },
            { id: 9, title: "Af die Bäicher Kärwa", lyrics: "Af die Bäicher Kärwa\nGänger mir ned nieber\nDenn die schänsten Kärwamadla\nHam die Almashiefer" },
            { id: 10, title: "Übern Zaun bin ich gstieng", lyrics: "Übern Zaun bin ich gstieng,\nmim oarsch hänger bliem,\ngreits dunnerwätter gflocht\nund mein Orsch widder gsoucht\nhullariereidium hullariereidium\ngreits dunnerwätter gflocht\nund mein Orsch widder gsoucht" },
            { id: 11, title: "Mich gfreit ja nix", lyrics: "Mich gfreit ja nix wie dass,\ndass ich nu frei und ledig bin \nund vom kinder kutschen schäim nix was,\nja mi gfreit ja nix wie dass." },
            { id: 12, title: "Alle meine Brüder", lyrics: "Alle meine Brüder saufen so wie ich, wie ich.\nAlle meine Brüder saufen so wie ich.\nLegen sich betrunken nieder \nStehen auf und Saufen wieder \nAlle meine Brüder saufen so wie ich." },
            { id: 13, title: "Schäins Käarwala", lyrics: "Hab mi seid längerer Zeit aff a schäins Käarwala gfreit,\netza is dou is dou etz bin i frouh" },
            { id: 14, title: "Ein Gerumbl", lyrics: "Auf der Welt is ein Gerumbl alles dreht sich um die Bumbl,\nAlles dreht sich um 3D Bumbl Beidl Bordmone" },
            { id: 15, title: "Heit is unser kärwa", lyrics: "Heit is unser, heit is unser, heit is unser kärwa wenn ma a ka geld ned ham mach ma rechtn lärma." },
            { id: 16, title: "Madla von Schillingsfirst", lyrics: "Ich hab a mal Madla kappt des war von Schillingsfirst,\nfidrifidralala, fidrifidralala\ndi hat noch gar kann drinna kappt die habbi 3 Tag bürscht" },
            { id: 17, title: "Mei Mudda kocht Nudeln", lyrics: "Mei Mudda kocht Nudeln und brunst a weng nei,\nHullareidium Hullareidium\ndou bleims a schäi safti und brenner ned nei \nHullareidium Hullareidium." },
            { id: 18, title: "Wenn I ins Dorf nei reit", lyrics: "Wenn I ins Dorf nei reit\nund mei schwarz Hengstla schreit\nnou wos mei Schozerla \netz kumm i glei" },
            { id: 19, title: "Wenn i ham kumm", lyrics: "Wenn i ham kumm, gäih ums Haus rum und am Kammerfenster klopf i ouh, \nwenn mei frau frocht wer draußn is soch i rumbl bumbl die Mo" },
            { id: 20, title: "Und do ham a nix gsunga", lyrics: "Text noch nicht vorhanden.", audioUrl: "gsunga.mp3" },
            { id: 21, title: "Wenn die Almashiefer kumma", lyrics: "Text noch nicht vorhanden.", audioUrl: "wenn die almoshiefer kumma.mp3" },
            { id: 22, title: "Ja die Peicha ihre Madla", lyrics: "Text noch nicht vorhanden.", audioUrl: "buecher madla.mp3" },
            { id: 23, title: "Kärwa ist kumma", lyrics: "Text noch nicht vorhanden.", audioUrl: "kaerwa ist kumma.mp3" },
            { id: 24, title: "Was ist denn des für Lärma", lyrics: "Text noch nicht vorhanden.", audioUrl: "laerm.mp3" },
            { id: 25, title: "Nieber, rieber, nauf und ro", lyrics: "Text noch nicht vorhanden.", audioUrl: "nueber.mp3" },
            { id: 26, title: "Geh Madla lous di ficka", lyrics: "Text noch nicht vorhanden.", audioUrl: "gei madla.mp3" },
            { id: 27, title: "Ja sou weis Almashiefer", lyrics: "Ja sou weis Almashiefer Kärwala so wädds ka zweite gehm,\nFidrifi tralala, Fidrifi tralala\nDrum soll ja unsere Kärwa a nu viele Jahre lehm,\nFidrifi tralala, kennst di aus!", audioUrl: "almoshiefer kaerwala.mp3" }
        ];

        const dict = [
            { f: "Aff", g: "Auf" }, { f: "Baicher", g: "Einwohner von Buch" }, { f: "Bassd scho", g: "Sehr gut" }, 
            { f: "Bäschla", g: "Burschen" }, { f: "Beidl", g: "Geldbeutel" }, { f: "Brunst", g: "Pinkelt" }, 
            { f: "Bumbl", g: "Glocke/Aufregung" }, { f: "Däft", g: "Dürfte/Darf" }, { f: "Drom", g: "Dort droben" }, 
            { f: "Etza", g: "Jetzt" }, { f: "Gerumbl", g: "Chaos" }, { f: "Graina", g: "Weinen" }, 
            { f: "Gstanzla", g: "Kurzes Spottlied" }, { f: "Kappt", g: "Gehabt" }, { f: "Muggn", g: "Mücken" }, 
            { f: "Nieber", g: "Hinüber" }, { f: "Ouh", g: "An/Anklopfen" }, { f: "Safti", g: "Saftig" }, 
            { f: "Schauma", g: "Schauen wir" }, { f: "Stieferla", g: "Stiefelchen" }
        ];

        let activeSongId = 1, practiceMode = false;

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-white', 'shadow-md'));
            document.getElementById('btn-' + tabId).classList.add('bg-white', 'shadow-md');
            if(tabId === 'tab-dictionary') document.getElementById('sidebar-songs').classList.add('hidden');
            else document.getElementById('sidebar-songs').classList.remove('hidden');
        }

        window.selectSong = function(id) {
            activeSongId = id;
            const song = kaerwaLieder.find(s => s.id === id);
            document.getElementById('active-song-title').textContent = song.title;
            document.getElementById('active-song-lyrics').textContent = song.lyrics;
            document.getElementById('practice-lyrics').textContent = song.lyrics;
            if(song.audioUrl) { document.getElementById('audio-container').classList.remove('hidden'); document.getElementById('audio-player').src = song.audioUrl; }
            else document.getElementById('audio-container').classList.add('hidden');
        }

        document.getElementById('btn-learn-mode').addEventListener('click', () => {
            practiceMode = !practiceMode;
            const containers = [document.getElementById('active-song-lyrics'), document.getElementById('practice-lyrics')];
            containers.forEach(c => practiceMode ? c.classList.add('blur-text') : c.classList.remove('blur-text'));
            document.getElementById('learn-text').textContent = practiceMode ? "Text zeigen" : "Lern-Modus";
        });

        // Initialize lists
        document.getElementById('song-list').innerHTML = kaerwaLieder.map(s => `<button onclick="selectSong(${s.id})" class="w-full text-left p-2 border-b border-white">${s.id}. ${s.title}</button>`).join('');
        document.getElementById('dictionary-grid').innerHTML = dict.map(d => `<div class="bg-white p-2 rounded shadow text-center"><div class="font-black text-[#c3242a]">${d.f}</div><div class="text-xs">${d.g}</div></div>`).join('');
        switchTab('tab-lyrics');
        lucide.createIcons();
    </script>
</body>
</html>
